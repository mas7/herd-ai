version: "3.9"

# ─────────────────────────────────────────────
#  Herd AI — Full Stack
#  Services:
#    api               FastAPI backend          :8000
#    phoenix           LLM + Agent tracing UI   :6006
#    mission-control   Agent orchestration UI   :3010
#
#  Run setup.sh first to clone mission-control source.
# ─────────────────────────────────────────────

services:

  # ── Herd API ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    depends_on:
      phoenix:
        condition: service_healthy

  # ── Arize Phoenix — LLM + Agent Observability ──
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # UI + OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix-data:/mnt/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Mission Control — Agent Orchestration Dashboard ──
  mission-control:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    volumes:
      - mission-control-data:/app/.data
    environment:
      - AUTH_USER=${MC_AUTH_USER:-admin}
      - AUTH_PASS=${MC_AUTH_PASS:-changeme}
      - AUTH_SECRET=${MC_AUTH_SECRET:-changeme-secret}
      - API_KEY=${MC_API_KEY:-changeme-api-key}
      - MC_ALLOW_ANY_HOST=true
      - NEXT_PUBLIC_GATEWAY_OPTIONAL=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  phoenix-data:
  mission-control-data:
