version: "3.9"

# ─────────────────────────────────────────────
#  Herd AI — Full Stack
#  Services:
#    api         FastAPI backend          :8000
#    langfuse    LLM observability UI     :3002
#    langfuse-db PostgreSQL for Langfuse
#
#  Dashboards (external — no custom UI):
#    Langfuse    http://localhost:3002     LLM traces, costs, latency
#    AgentOps    https://app.agentops.ai  CrewAI agent run monitoring
# ─────────────────────────────────────────────

services:

  # ── Herd API ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LANGFUSE_HOST=http://langfuse:3000
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    depends_on:
      langfuse:
        condition: service_healthy

  # ── Langfuse — LLM Observability ──────────
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-herd-langfuse-secret-change-me}
      SALT: ${LANGFUSE_SALT:-herd-langfuse-salt-change-me}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  langfuse-db:
